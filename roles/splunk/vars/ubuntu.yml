---

splunk_user: splunkfwd
splunk_server_name: splunkforwarder

splunk_version: "9.4.6"
splunk_deb: https://admin.bx.psu.edu/splunk/splunkforwarder-9.4.6-60284236e579-linux-{{ (ansible_architecture == 'aarch64') | ternary ('arm64', 'amd64') }}.deb

splunk_packages:
  - acl
  - splunkforwarder

splunk_root_dir: /opt/splunkforwarder
splunk_apps_dir: "{{ splunk_root_dir }}/etc/apps"

splunk_apps:
  - 999-DS-SSL-base_uf
  - 999-DS-SSL-certs_cacert_uf
  - 999-DS-SSL-certs_uf
  - 999_uf-output_to-idx_ssl
  - DS-Splunk-deployment_client

splunk_service_template: splunk.service.j2

splunk_deploymentclient_dest: "{{ splunk_root_dir }}/etc/system/local/deploymentclient.conf"
splunk_launch_dest: "{{ splunk_root_dir }}/etc/splunk-launch.conf"
