---

- name: Create error pages root
  ansible.builtin.file:
    path: "{{ error_pages_root }}"
    mode: "0755"
    state: directory

- name: Install error pages templates
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ error_pages_root }}/{{ item }}"
    mode: "0644"
  loop:
    - 403.html
    - 404.html
    - 413.html
    - 502.html
    - style.css
