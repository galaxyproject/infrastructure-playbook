---

smartos_images:
  # debian-10 20200508 linux zvol
  - uuid: 9bcfe5cc-007d-4f23-bc8a-7e7b4d0c537e
    state: present
  # debian-13 20260414 linux zvol 2026-04-14
  - uuid: d8a690d8-03cc-4f0d-ad2c-17ad2b6c1d4c
    state: present
  # almalinux-9 20260430 linux zvol 2026-04-30
  - uuid: aa2f07ed-90ca-4cc1-b851-31fd9172757e
    state: present

smartos_vms:
  - name: jeltz
    brand: bhyve
    ram: 4096
    vcpus: 2
    resolvers: "{{ smartos_resolvers }}"
    nics:
      - nic_tag: external
        ip: "{{ lookup('dig', 'jeltz.galaxyproject.org') }}"
        netmask: 255.255.255.224
        gateway: 128.118.250.1
        vlan_id: 306
        model: virtio
    disks:
      - image_uuid: aa2f07ed-90ca-4cc1-b851-31fd9172757e
        boot: true
        model: virtio
        size: 24576
      # /var/lib/cvmfs
      - boot: false
        model: virtio
        size: 8192
    customer_metadata:
      root_authorized_keys: "{{ ssh_public_keys.nate_coraor }}"
  - name: eddie
    brand: bhyve
    ram: 12288
    vcpus: 2
    resolvers: "{{ smartos_resolvers }}"
    nics:
      - nic_tag: external
        ip: "{{ lookup('dig', 'eddie.galaxyproject.org') }}"
        netmask: 255.255.255.224
        gateway: 128.118.250.1
        vlan_id: 306
        model: virtio
    disks:
      - image_uuid: d8a690d8-03cc-4f0d-ad2c-17ad2b6c1d4c
        boot: true
        model: virtio
        size: 24576
      # postgres
      - boot: false
        model: virtio
        size: 24576
      # srv
      - boot: false
        model: virtio
        size: 131072
    customer_metadata:
      root_authorized_keys: "{{ ssh_public_keys.nate_coraor }}"
  - name: jenkins0
    brand: bhyve
    ram: 8192
    vcpus: 2
    resolvers: "{{ smartos_resolvers }}"
    nics:
      - nic_tag: external
        ip: "{{ lookup('dig', 'jenkins0.galaxyproject.org') }}"
        netmask: 255.255.255.0
        gateway: 172.18.2.1
        vlan_id: 406
        model: virtio
    disks:
      - image_uuid: 9bcfe5cc-007d-4f23-bc8a-7e7b4d0c537e
        boot: true
        model: virtio
      - boot: false
        model: virtio
        size: 262144
    customer_metadata:
      root_authorized_keys: "{{ ssh_public_keys.nate_coraor }}"
