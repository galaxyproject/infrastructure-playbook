# dnf erase -y nvidia-container-tools nvidia-container-toolkit-base nvidia-linux-grid tigervnc-server docker-ce docker-ce-cli docker-buildx-plugin docker-compose-plugin containerd.io

os_key_name: nate-treehouse
os_image: Featured-RockyLinux9
os_flavor: m3.quad

os_security_groups:
  - default
  - cvmfs

os_floating_ips:
  - "{{ lookup('dig', inventory_hostname) }}"

#os_volumes:
#  - name: "{{ inventory_hostname_short }}-srv"
#    size: 32768
#    fstype: ext4

#filesystems: is set automatically by the playbook in os_volume_devices.yml

# this is parallel with os_volumes and filesystems
host_mounts:
  - path: /srv
    src: /dev/sdb
    fstype: ext4

cvmfs_srv_device: /dev/sdb
