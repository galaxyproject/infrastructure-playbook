---

hpc_home_root: "/jet/home/xcgalaxy"
hpc_project_root: "/ocean/projects/mcb140028p/xcgalaxy"
hpc_scratch_root: "{{ hpc_project_root }}"

# This is the rebased commit on top of the cvmfsexec-singularity branch
pulsar_package_name: "git+https://github.com/natefoo/pulsar.git@6b68a58c72e2687a792f67e34f00e3e9f5f3f617#egg=pulsar-app"
pulsar_package_version: "{{ omit }}"

#hpc_pulsar_prepend_path:
#  - /opt/packages/slurm/default/sbin
#  - /opt/packages/slurm/default/bin

#hpc_pulsar_append_ld_library_path:
#  - /opt/packages/slurm/default/lib64

hpc_pulsar_env:
  - SLURM_CONF="/run/slurm/conf/slurm.conf"

hpc_pulsar_managers:
  test_bridges2:
    type: queued_drmaa
    staging_directory: "{{ pulsar_staging_dir }}/test"
  bridges2:
    type: queued_drmaa
    staging_directory: "{{ pulsar_staging_dir }}/main"
    preprocess_action_max_retries: 10
    preprocess_action_interval_start: 2
    preprocess_action_interval_step: 2
    preprocess_action_interval_max: 60
    postprocess_action_max_retries: 10
    postprocess_action_interval_start: 2
    postprocess_action_interval_step: 2
    postprocess_action_interval_max: 60
    min_polling_interval: 15

pulsar_clean_jobs_percent_full_function: |
  /opt/packages/psc.allocations.user/env/bin/python3 <<EOF
  try:
      from pathlib import Path
      from psc.accounting import Context, utils
      context = Context()
      cluster = context.cluster
      group = "mcb140028p"
      path = Path(cluster.group_filesystem.get_path(group))
      fs = cluster.group_filesystem
      quota = fs.get_project_quota(str(path))
      size_ratio = quota.used_capacity / quota.soft_limit
      inode_ratio = quota.used_inodes / quota.soft_limit_inodes
      print(round(100 * max(size_ratio, inode_ratio)))
  except Exception as exc:
      traceback.print_exception(exc, file=sys.stderr)
      print(0)
  EOF
