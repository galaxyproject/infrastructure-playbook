smartos_vms:
  - name: radegast
    brand: bhyve
    ram: 12288
    vcpus: 4
    resolvers: "{{ smartos_resolvers }}"
    nics:
      - nic_tag: external
        ip: "{{ lookup('dig', 'radegast.galaxyproject.org') }}"
        netmask: 255.255.255.224
        gateway: 128.118.250.1
        vlan_id: 306
        model: virtio
    disks:
      - image_uuid: d8a690d8-03cc-4f0d-ad2c-17ad2b6c1d4c
        boot: true
        model: virtio
        size: 24576
      # postgres
      - boot: false
        model: virtio
        size: 98304
      # srv
      - boot: false
        model: virtio
        size: 131072
    customer_metadata:
      root_authorized_keys: "{{ ssh_public_keys.nate_coraor }}"
