---

smartos_images:
  # rocky-9 20230711 linux zvol
  - uuid: 1e34ba45-9683-400a-9f99-571765962f94
    state: present
  # rocky-9 20231127 linux zvol
  - uuid: cb4f996d-df4b-4a83-95c0-11fa2d88abd3
    state: present
  # almalinux-9 20260430 linux zvol 2026-04-30
  - uuid: aa2f07ed-90ca-4cc1-b851-31fd9172757e
    state: present
  # debian-13 20260414 linux zvol 2026-04-14
  - uuid: d8a690d8-03cc-4f0d-ad2c-17ad2b6c1d4c
    state: present

smartos_vms:
  - name: duvel
    brand: bhyve
    ram: 4096
    vcpus: 2
    resolvers: "{{ smartos_resolvers }}"
    nics:
      - nic_tag: external
        ip: 128.118.250.8
        netmask: 255.255.255.224
        gateway: 128.118.250.1
        vlan_id: 306
        model: virtio
    disks:
      - image_uuid: d8a690d8-03cc-4f0d-ad2c-17ad2b6c1d4c
        boot: true
        model: virtio
        size: 24576
    customer_metadata:
      root_authorized_keys: "{{ ssh_public_keys.nate_coraor }}"
  - name: cvmfs0-psu1
    brand: bhyve
    ram: 12288
    vcpus: 4
    resolvers: "{{ smartos_resolvers }}"
    nics:
      - nic_tag: external
        ip: "{{ lookup('dig', 'cvmfs0-psu1.galaxyproject.org') }}"
        netmask: 255.255.255.224
        gateway: 128.118.250.1
        vlan_id: 306
        model: virtio
    disks:
      - image_uuid: aa2f07ed-90ca-4cc1-b851-31fd9172757e
        boot: true
        model: virtio
        size: 24576
      # /var/spool/cvmfs
      - boot: false
        model: virtio
        size: 16384
      # /srv
      - boot: false
        model: virtio
        size: 294912
    customer_metadata:
      root_authorized_keys: "{{ ssh_public_keys.nate_coraor }}"
  # grafana was segfaulting after the latest update on a centos-7 lx zone, so I figured we'd try a rockylinux-9 zone,
  # but got the same thing. the core doesn't load in gdb even on a real Linux host (probably due to lx but I'm not going
  # to take the time to figure out the exact issue and whether it can be fixed) so moving to bhyve
  - name: stats
    brand: bhyve
    ram: 24576
    vcpus: 4
    resolvers: "{{ smartos_resolvers }}"
    nics:
      - nic_tag: external
        ip: "{{ lookup('dig', 'stats.galaxyproject.org') }}"
        netmask: 255.255.255.224
        gateway: 128.118.250.1
        vlan_id: 306
        model: virtio
    disks:
      - image_uuid: aa2f07ed-90ca-4cc1-b851-31fd9172757e
        boot: true
        model: virtio
        size: 24576
      # /var/lib/influxdb
      - boot: false
        model: virtio
        size: 262144
    customer_metadata:
      root_authorized_keys: "{{ ssh_public_keys.nate_coraor }}"
