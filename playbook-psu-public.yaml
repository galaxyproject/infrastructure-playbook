---

- name: Tasks for Automatic Update hosts
  hosts: auto_update_hosts
  roles:
    - role: auto_update
  tags: auto_update

- name: Tasks for Splunk agents
  hosts: splunk_agents
  roles:
    - role: galaxyproject.general.users
    - role: splunk
  tags: splunk

- name: Tasks for Nessus agents
  hosts: nessus_agents
  roles:
    - role: nessus
  tags: nessus

- name: Tasks for Microsoft Defender agents
  hosts: defender_agents
  roles:
    - role: defender_atp
  tags: [mdatp, defender]

- name: Tasks for SentinelOne agents
  hosts: sentinelone_agents
  pre_tasks:
    - name: Remove Microsoft Defender packages
      ansible.builtin.package:
        name: mdatp
        state: absent
    - name: Remove Microsoft apt repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/microsoft-{{ ansible_lsb.codename }}.list
        state: absent
      when: ansible_os_family == "Debian"
    - name: Remove Microsoft yum repo
      ansible.builtin.file:
        path: /etc/yum.repos.d/microsoft-rhelprod.repo
        state: absent
      when: ansible_os_family == "RedHat"
  roles:
    - role: sentinelone
  tags: sentinelone
