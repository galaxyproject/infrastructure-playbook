---
# This is included for Galaxy Test hosts to provide Test-specific values

galaxy_config_id_secret: "{{ vault_galaxy_config_id_secret }}"  # needed by tiaas
hashicorp_vault_unseal_key: "{{ vault_hashicorp_vault_unseal_key }}"
hashicorp_vault_root_token: "{{ vault_hashicorp_vault_root_token }}"
hashicorp_vault_user_password: "{{ vault_hashicorp_vault_user_password }}"
hashicorp_vault_secret_values:
  #- path: data/galaxy/file_source_secrets/dropbox/app_client_id
  #  data: {data: {value: "{{ vault_dropbox_client_id }}"}, options: {}}
  #- path: data/galaxy/file_source_secrets/dropbox/app_client_secret
  #  data: {data: {value: "{{ vault_dropbox_client_secret }}"}, options: {}}
  - path: data/galaxy/file_source_secrets/google_drive/app_client_id
    data: {data: {value: "{{ vault_google_drive_client_id }}"}, options: {}}
  - path: data/galaxy/file_source_secrets/google_drive/app_client_secret
    data: {data: {value: "{{ vault_google_drive_client_secret }}"}, options: {}}

hashicorp_vault_addr: "https://{{ galaxy_instance_hostname }}:8200"

# Variables used by other group vars
galaxy_db_postgresql_pg_hba_conf: "{{ vault_galaxy_db_postgresql_pg_hba_conf + _keycloak_test_pg_hba }}"
# Keycloak user federation authenticates test logins against
# galaxy_test.galaxy_user, so the galaxy-keycloak container (on galaxy-main4)
# needs a read-only role on this cluster. Append it to the vault-managed
# objects rather than hand-editing the encrypted lists. The credentials live
# in vault_keycloak_test_database_{username,password}; that vault var must be
# readable here AND by the keycloak_servers host that configures the provider.
galaxy_db_postgresql_objects_users: "{{ vault_galaxy_db_postgresql_objects_users + _keycloak_test_db_objects_users }}"
galaxy_db_postgresql_objects_groups: "{{ vault_galaxy_db_postgresql_objects_groups }}"
galaxy_db_postgresql_objects_databases: "{{ vault_galaxy_db_postgresql_objects_databases }}"
galaxy_db_postgresql_objects_privileges: "{{ vault_galaxy_db_postgresql_objects_privileges + _keycloak_test_db_objects_privileges }}"

_keycloak_test_db_objects_users:
  # postgresql_user creates a LOGIN role by default; no role_attr_flags needed.
  - name: "{{ vault_keycloak_test_database_username }}"
    password: "{{ vault_keycloak_test_database_password }}"

_keycloak_test_db_objects_privileges:
  # Least privilege: connect to galaxy_test, use the schema, read galaxy_user only.
  - database: galaxy_test
    roles: "{{ vault_keycloak_test_database_username }}"
    type: database
    privs: CONNECT
  - database: galaxy_test
    roles: "{{ vault_keycloak_test_database_username }}"
    objs: public
    type: schema
    privs: USAGE
  - database: galaxy_test
    roles: "{{ vault_keycloak_test_database_username }}"
    objs: galaxy_user
    type: table
    privs: SELECT

# pg_hba rule letting the Keycloak host (galaxy-main4) reach galaxy_test as the
# federation role. The galaxy-keycloak container egresses with main4's own
# address (NOT the Main LB), so resolve the keycloak_servers host. Verify
# `dig +short galaxy-main4.tacc.utexas.edu` matches main4's egress IP; if main4
# is multi-homed and DNS differs, pin the literal /32 here instead. Appended
# after the vault rules (which fall through to the implicit deny for this
# host/user/db today). Use scram-sha-256 to match the cluster's
# password_encryption; switch to md5 if it still stores md5 hashes.
_keycloak_test_pg_hba:
  - "host galaxy_test {{ vault_keycloak_test_database_username }} {{ lookup('dig', groups.keycloak_servers[0]) }}/32 scram-sha-256"
galaxy_user: g2test
galaxy_instance_codename: test
galaxy_instance_hostname: test.galaxyproject.org
galaxy_cvmfs_repo: test.galaxyproject.org
galaxy_db_host: /var/run/postgresql

## Used by: cleanup jobs, gravity_config, nginx templates; these need to be changed in unision with usegalaxy-playbook
galaxy_cleanup_hour: 0
galaxy_log_dir: "/srv/galaxy/{{ galaxy_instance_codename }}/log"
galaxy_job_working_directory: "/corral4/{{ galaxy_instance_codename }}/jobs"
galaxy_new_file_path: "/corral4/{{ galaxy_instance_codename }}/scratch"
galaxy_tus_upload_store: "/corral4/{{ galaxy_instance_codename }}/upload"
galaxy_job_conf_persistence_directory: "/srv/galaxy/{{ galaxy_instance_codename }}/var/pulsar_amqp_ack"
galaxy_celery_scratch_path: "/corral4/{{ galaxy_instance_codename }}/celery-scratch"
nginx_job_files_upload_store: "/corral4/{{ galaxy_instance_codename }}/upload_job_files"

## Used by: gravity_config
galaxy_interactivetools_map: "/srv/galaxy/{{ galaxy_instance_codename }}/var/interactivetools_map.sqlite"

# default, can be overridden
galaxy_memory_limit: 7
galaxy_memory_high: 6.8

# Test-specific TIaaS vars
tiaas_galaxy_db_host: "/var/run/postgresql/"
tiaas_disassociate_training_roles:
  hour: 8

# Test-specific nginx vars
nginx_conf_user: "{{ galaxy_user }}"
nginx_conf_group: G-803372
nginx_default_redirect_uri: https://test.galaxyproject.org$request_uri

nginx_servers:
  - default

#nginx_mod_zip_url: https://github.com/natefoo/mod-zip-dso/raw/main/nginx-1.12.2-el7/ngx_http_zip_module.so
#nginx_load_modules:
#  - order: 50
#    path: ngx_http_zip_module.so

_nginx_tmp_dir: /var/cache/nginx
_nginx_conf_http:
  client_max_body_size: 10g
  proxy_read_timeout: 600
  client_body_temp_path: "{{ _nginx_tmp_dir }}/client_body"
  proxy_temp_path: "{{ _nginx_tmp_dir }}/proxy"
  fastcgi_temp_path: "{{ _nginx_tmp_dir }}/fastcgi"
  uwsgi_temp_path: "{{ _nginx_tmp_dir }}/uwsgi"
  scgi_temp_path: "{{ _nginx_tmp_dir }}/scgi"

nginx_ssl_servers:
  - galaxy_test

certbot_domains:
  - test.galaxyproject.org
  - '*.ep.interactivetool.test.galaxyproject.org'

certbot_post_renewal: |
    systemctl restart nginx || true
    pkill -HUP vault || true

## Used by: nginx template
galaxy_server_dir: /cvmfs/test.galaxyproject.org/galaxy
galaxy_tusd_port: 1080
gxit_proxy_host: 127.0.0.1
gxit_proxy_port: 8910

## Used by: slurm-drmaa install task in playbook-galaxy-stack
slurm_drmaa_rpm_url: https://github.com/natefoo/slurm-drmaa/releases/download/1.1.4/slurm-drmaa-1.1.4-22.05.el9.x86_64.rpm
