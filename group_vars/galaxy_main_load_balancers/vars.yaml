---

pulsar_relay_access_allow: "{{ vault_pulsar_relay_access_allow }}"
# auth.usegalaxy.org's public realms (galaxy, galaxy-test) are intentionally
# open; only the /admin/ surface and the master realm stay IP-restricted via
# usegalaxy_auth_admin_access_allow (see templates/nginx/usegalaxy_lb.j2).
usegalaxy_auth_admin_access_allow: "{{ vault_usegalaxy_auth_admin_access_allow }}"

systemd_journald_persistent: true

# gxsrc for static and error documents
galaxy_main_load_balancers_group_groups:
  - "{{ tacc_groups.gxsrc }}"
  - "{{ tacc_groups.G_803372 }}"

galaxy_main_load_balancers_group_users:
  - "{{ tacc_users.gxsrc }}"

galaxy_main_load_balancers_group_authorized_key_users:
  - name: gxsrc
    authorized: "{{ galaxy_team_users }}"

galaxy_main_load_balancers_group_systemd_overrides:
  - name: "nginx"
    override:
      LogNamespace: "nginx"

galaxy_main_load_balancers_group_directories:
  # the nginx-core package owns /var/lib/nginx and will change ownership on update
  - path: "{{ _nginx_tmp_dir }}"
    owner: "{{ galaxy_user }}"
    group: "{{ galaxy_group }}"
    mode: "0750"

_override_telegraf_agent_output:
  - type: influxdb
    config:
      - urls = ["https://influx.galaxyproject.org"]
      - username = "client"
      - password = "{{ influxdb_client_pass }}"
      - database = "system"
      - '[outputs.influxdb.tagdrop]'
      - '  influxdb_database = ["*"]'
  - type: influxdb
    config:
      - urls = ["https://influx.galaxyproject.org"]
      - username = "client"
      - password = "{{ influxdb_client_pass }}"
      - database = "{{ galaxy_instance_codename }}_requests"
      - 'tagexclude = ["influxdb_database"]'
      - '[outputs.influxdb.tagpass]'
      - '  influxdb_database = ["{{ galaxy_instance_codename }}_requests"]'

galaxy_main_load_balancers_group_telegraf_plugins_extra:
  logflux_nginx:
    plugin: "exec"
    config:
      - commands = ["/opt/logflux/bin/logflux --source journald --telegraf --config /etc/telegraf/logflux.yaml"]
      # BEWARE THIS TIMEOUT VALUE if it's low, then a single run can never repeat and you create a cascading failure
      # where there's more records to process on each subsequent run. Best to set it high.
      - timeout = "30m"
      - data_format = "influx"
      - interval = "5m"
      - '[inputs.exec.tags]'
      - '  influxdb_database = "main_requests"'

# must run as g2main for x-accel-redirect
#nginx_conf_user: nginx
#nginx_conf_group: nginx

nginx_conf_worker_connections: 4096
nginx_conf_root_extra: |
  worker_rlimit_nofile 8192;

nginx_ssl_servers:
  - usegalaxy_lb

nginx_extra_configs:
  - usegalaxy_rewrites.conf
  - usegalaxy_proxy.conf
  - conf.d/rate_limit.conf
