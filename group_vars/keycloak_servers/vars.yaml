---

keycloak_servers_group_rpm_keys:
  - key: https://download.docker.com/linux/rhel/gpg
    fingerprint: 060A 61C5 1B55 8A7F 742B 77AA C52F EB6B 621E 9F35

keycloak_servers_group_yum_repositories:
  - name: docker-ce-stable
    file: docker-ce
    description: Docker CE Stable - $basearch
    baseurl: https://download.docker.com/linux/rhel/$releasever/$basearch/stable
    enabled: 1
    gpgcheck: 1
    gpgkey: https://download.docker.com/linux/rhel/gpg

keycloak_servers_group_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

keycloak_servers_group_services:
  - name: docker.service
    state: started
    enabled: true

keycloak_database_url: jdbc:postgresql://galaxy-db.tacc.utexas.edu:5432/keycloak
keycloak_hostname: auth.usegalaxy.org

# Pinned Keycloak base image tag (templates/keycloak/Dockerfile.j2). Bump
# deliberately rather than tracking a floating minor tag like "26.0".
keycloak_image_version: "26.6.2"

# Container resource/security limits (see the Run Keycloak task). Generous
# defaults so logins/threads aren't throttled; raise if the JVM is OOM-killed
# or logs CPU/thread starvation. galaxy-main4 is shared with the Galaxy worker.
keycloak_container_memory: "4g"
keycloak_container_cpus: 4.0
keycloak_container_pids_limit: 4096
keycloak_log_max_size: "20m"
keycloak_log_max_file: "5"

# Realm holding the Galaxy clients and user federation (provisioned out-of-band).
keycloak_realm: galaxy

# Decommission the static bootstrap admin. Enabled now that the automation
# admin + human MFA admins are verified working; the init script only acts on
# this once it has authenticated AS the automation admin (never locks itself
# out). Keep KC_BOOTSTRAP_ADMIN_* in the container env until this has run once
# (the disable step reads the bootstrap username from it).
keycloak_disable_bootstrap_admin: true

# Galaxy API bearer-token scope configuration (see templates/keycloak/init-galaxy-scope.sh.j2).
keycloak_galaxy_oidc_scope_prefix: "https://galaxyproject.org/api"
keycloak_galaxy_api_audience: galaxy-api
# Clients in the realm that should receive the Galaxy API scopes as defaults.
# Leave empty to create the scopes without assigning them to any client.
keycloak_galaxy_api_clients:
  - brc-analytics

# OIDC clients to provision in the realm (idempotent; created only if absent,
# never updated in place). Modeled on brc-analytics' realm-export.json, but
# with production URLs and vaulted secrets instead of the localhost testbed
# values. Add the referenced vault_* secrets, and confirm the galaxy-api
# redirect URI matches Galaxy's oidc_backends_config.xml, before deploying.
keycloak_galaxy_clients:
  # BFF web-app client. Its access tokens get the galaxy-api audience + the
  # "<prefix>:*" Galaxy API scope (see keycloak_galaxy_api_clients above).
  - client_id: brc-analytics
    name: "BRC Analytics"
    secret: "{{ vault_keycloak_brc_analytics_client_secret }}"
    public: false
    standard_flow: true
    direct_access_grants: false
    service_accounts: false
    frontchannel_logout: true
    pkce: S256
    redirect_uris:
      - "https://brc-analytics.org/api/v1/auth/callback"
    web_origins:
      - "https://brc-analytics.org"
    post_logout_redirect_uris:
      - "https://brc-analytics.org/*"
  # Resource-server client Galaxy uses as its OIDC provider and as the
  # accepted bearer-token audience (keycloak_galaxy_api_audience). The
  # redirect URI must match Galaxy's oidc_backends_config.xml redirect_uri.
  - client_id: galaxy-api
    name: "Galaxy API"
    secret: "{{ vault_keycloak_galaxy_api_client_secret }}"
    public: false
    standard_flow: true
    direct_access_grants: false
    service_accounts: true
    redirect_uris:
      - "https://usegalaxy.org/authnz/keycloak/callback"
    web_origins:
      - "https://usegalaxy.org"

# Galaxy database the user-federation provider authenticates users against.
# Uses the dedicated "keycloak" role on the Galaxy main DB, whose password is
# set to keycloak_database_password in vault_galaxy_db_postgresql_objects_users.
keycloak_galaxy_db_url: "jdbc:postgresql://galaxy-db.tacc.utexas.edu:5432/galaxy_main"
keycloak_galaxy_db_username: keycloak
keycloak_galaxy_db_password: "{{ keycloak_database_password }}"
