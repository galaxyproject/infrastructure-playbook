---

keycloak_servers_group_rpm_keys:
  - key: https://download.docker.com/linux/rhel/gpg
    fingerprint: 060A 61C5 1B55 8A7F 742B 77AA C52F EB6B 621E 9F35

keycloak_servers_group_yum_repositories:
  - name: docker-ce-stable
    file: docker-ce
    description: Docker CE Stable - $basearch
    baseurl: https://download.docker.com/linux/rhel/$releasever/$basearch/stable
    enabled: 1
    gpgcheck: 1
    gpgkey: https://download.docker.com/linux/rhel/gpg

keycloak_servers_group_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

keycloak_servers_group_services:
  - name: docker.service
    state: started
    enabled: true

keycloak_database_url: jdbc:postgresql://galaxy-db.tacc.utexas.edu:5432/keycloak
keycloak_hostname: auth.usegalaxy.org

# Pinned Keycloak base image tag (templates/keycloak/Dockerfile.j2). Bump
# deliberately rather than tracking a floating minor tag like "26.0".
keycloak_image_version: "26.6.3"

# Pinned galaxy-keycloak-theme release. Dockerfile.j2 ADDs this jar into
# /opt/keycloak/providers/, and init-galaxy-scope.sh sets each realm's
# loginTheme/emailTheme to "galaxy". Bump deliberately alongside a new theme
# release (https://github.com/galaxyproject/galaxy-keycloak-theme/releases).
keycloak_theme_version: "0.1.0"

# Pinned galaxy-user-provider release tag (the User Storage SPI jar pulled in
# templates/keycloak/Dockerfile.j2). The release tag's CI attaches the jar as
# a download asset. v0.1.1 fixes the federated-id/getUserById mismatch that
# made code-to-token exchange fail with invalid_code; v0.1.2 surfaces
# email/firstName/lastName as Keycloak attributes so the token carries the
# email claim (without it Galaxy's OIDC login crashes on a null email).
keycloak_user_provider_version: "v0.1.2"

# Container resource/security limits (see the Run Keycloak task). Generous
# defaults so logins/threads aren't throttled; raise if the JVM is OOM-killed
# or logs CPU/thread starvation. galaxy-main4 is shared with the Galaxy worker.
keycloak_container_memory: "4g"
keycloak_container_cpus: 4.0
keycloak_container_pids_limit: 4096
keycloak_log_max_size: "20m"
keycloak_log_max_file: "5"

# Audit-event retention (days) for login events; admin events have no TTL.
keycloak_events_expiration_days: 90

# Decommission the static bootstrap admin. Enabled now that the automation
# admin + human MFA admins are verified working; the init script only acts on
# this once it has authenticated AS the automation admin (never locks itself
# out). Keep KC_BOOTSTRAP_ADMIN_* in the container env until this has run once
# (the disable step reads the bootstrap username from it).
keycloak_disable_bootstrap_admin: true

# Keycloak realms provisioned and configured by init-galaxy-scope.sh. Each realm
# is created idempotently, hardened, and given its Galaxy user federation plus
# OIDC clients (modeled on brc-analytics' realm-export.json). Client secrets and
# federation DB credentials are NOT rendered here or into the image: they are
# injected via env at exec time (see the "Configure Galaxy API scopes and user
# federation" task in playbook-keycloak-servers.yaml). The env var names are
# derived as KC_SECRET_<REALM>_<CLIENTID> and KC_FED_{USER,PASS}_<REALM>
# (uppercased, hyphens -> underscores).
keycloak_realms:
  - name: galaxy
    oidc_scope_prefix: "https://galaxyproject.org/api"
    api_audience: galaxy-api
    api_clients:
      - brc-analytics
    federation:
      jdbc_url: "jdbc:postgresql://galaxy-db.tacc.utexas.edu:5432/galaxy_main"
    clients:
      # BFF web-app client; its access tokens get the galaxy-api audience + the
      # "<prefix>:*" Galaxy API scope (see api_clients above).
      - client_id: brc-analytics
        name: "BRC Analytics"
        public: false
        standard_flow: true
        service_accounts: false
        frontchannel_logout: true
        pkce: S256
        redirect_uris:
          - "https://brc-analytics.org/api/v1/auth/callback"
        web_origins:
          - "https://brc-analytics.org"
        post_logout_redirect_uris:
          - "https://brc-analytics.org/*"
      # Resource-server client Galaxy uses as its OIDC provider and bearer-token
      # audience. redirect_uri must match Galaxy's oidc_backends_config.xml.
      - client_id: galaxy-api
        name: "Galaxy API"
        public: false
        standard_flow: true
        service_accounts: true
        redirect_uris:
          - "https://usegalaxy.org/authnz/keycloak/callback"
        web_origins:
          - "https://usegalaxy.org"

  # test.galaxyproject.org: lets dev sites (e.g. dev.brc-analytics.org) log users
  # in as test.galaxyproject.org accounts and call its API. Federates against
  # galaxy_test on galaxy-test (the keycloak DB role is codified in
  # group_vars/meta_galaxy_test).
  - name: galaxy-test
    oidc_scope_prefix: "https://galaxyproject.org/api"
    api_audience: galaxy-api
    api_clients:
      - dev-brc-analytics
    federation:
      jdbc_url: "jdbc:postgresql://galaxy-test.tacc.utexas.edu:5432/galaxy_test"
    clients:
      - client_id: dev-brc-analytics
        name: "BRC Analytics (dev)"
        public: false
        standard_flow: true
        service_accounts: false
        frontchannel_logout: true
        pkce: S256
        redirect_uris:
          - "https://dev.brc-analytics.org/api/v1/auth/callback"
        web_origins:
          - "https://dev.brc-analytics.org"
        post_logout_redirect_uris:
          - "https://dev.brc-analytics.org/*"
      - client_id: galaxy-api
        name: "Galaxy API (test)"
        public: false
        standard_flow: true
        service_accounts: true
        redirect_uris:
          - "https://test.galaxyproject.org/authnz/keycloak/callback"
        web_origins:
          - "https://test.galaxyproject.org"

# Galaxy main federation DB credentials (injected via env; see playbook). The
# galaxy-test credentials come straight from vault_keycloak_test_database_*.
keycloak_galaxy_db_username: keycloak
keycloak_galaxy_db_password: "{{ keycloak_database_password }}"
